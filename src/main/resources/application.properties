spring.application.name=invoice-management-system

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/invoice_management_system?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080

app.jwt.secret=${JWT_SECRET:change-this-development-secret-key-change-this-development-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

info.app.name=Enterprise Invoice Management System
info.app.description=Secure invoice approval workflow with audit logs and payment tracking
info.app.version=1.0.0
